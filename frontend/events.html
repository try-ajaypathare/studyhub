<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSAAS · Events</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <main class="main">
      <div id="topbar-slot"></div>

      <section class="section fade-in">
        <header class="section-header">
          <div>
            <h2 class="section-title">My events</h2>
            <div class="section-meta" id="meta">— upcoming · — registered</div>
          </div>
          <div class="section-actions">
            <select id="filter" style="height: 38px;">
              <option value="all">All types</option>
              <option value="Academic">Academic</option>
              <option value="Cultural">Cultural</option>
              <option value="Sports">Sports</option>
              <option value="Career">Career</option>
              <option value="Workshop">Workshop</option>
              <option value="Other">Other</option>
            </select>
            <button class="btn btn-primary" id="btn-add">
              <span style="display:flex;" id="add-icon"></span> Add event
            </button>
          </div>
        </header>
        <div class="grid grid-3" id="event-grid"></div>
      </section>

      <footer class="app-footer">
        <div>SSAAS · Events · domain class with full CRUD via REST</div>
        <a href="index.html" class="btn btn-ghost">← Overview</a>
      </footer>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/alerts.js"></script>
  <script>
    injectShell();
    setActiveNav('nav-events');
    $('#add-icon').innerHTML = plusSvg();

    let cached = [];

    async function load() {
      try {
        const [student, events] = await Promise.all([API.student(), API.events()]);
        cached = events;
        const slot = $('#topbar-slot'); slot.innerHTML = '';
        slot.appendChild(topbar('Events', 'Browse, register and manage events', student));

        const upcoming = events.filter(e => e.daysUntil >= 0).length;
        const registered = events.filter(e => e.registered).length;
        $('#meta').textContent = `${upcoming} upcoming · ${registered} registered`;

        renderGrid(events);
      } catch (err) { showError($('.main'), err); }
    }

    const TYPE_KIND = {
      'Academic': 'info',
      'Cultural': 'acc',
      'Sports':   'pos',
      'Career':   'cau',
      'Workshop': '',
      'Other':    '',
    };

    function renderGrid(events) {
      const filter = $('#filter').value;
      const filtered = (filter === 'all') ? events : events.filter(e => e.type === filter);

      const grid = $('#event-grid');
      grid.innerHTML = '';
      if (!filtered.length) {
        grid.appendChild(el('div', { class: 'card empty', style: 'grid-column: 1/-1;' }, [
          el('div', { class: 'empty-icon', html: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" width=\"24\" height=\"24\"><path d=\"M12 2l3 7 7 .5-5.5 4.7L18 22l-6-3.7L6 22l1.5-7.8L2 9.5 9 9z\"/></svg>' }),
          el('div', { class: 'empty-title' }, 'No events here'),
          el('div', { class: 'empty-text' }, 'Try a different filter, or add a new event.'),
          el('button', { class: 'btn btn-primary', onClick: openAddDialog }, 'Add event'),
        ]));
        return;
      }
      const sorted = [...filtered].sort((a, b) => a.date.localeCompare(b.date));
      sorted.forEach(e => {
        const isPast = e.daysUntil < 0;
        const urgKind = isPast ? '' :
                        e.daysUntil <= 3 ? 'neg' :
                        e.daysUntil <= 7 ? 'cau' : 'info';

        const card = el('div', { class: 'card hoverable' }, [
          el('div', { class: 'card-head' }, [
            el('div', { style: 'min-width: 0;' }, [
              el('div', { class: 'flex gap-2' }, [
                el('span', { class: 'chip ' + (TYPE_KIND[e.type] || '') }, e.type),
                isPast
                  ? el('span', { class: 'chip' }, 'past')
                  : el('span', { class: 'chip ' + urgKind }, `${e.daysUntil}d away`),
                e.registered ? el('span', { class: 'chip pos' }, '✓ registered') : null,
              ]),
              el('h3', { class: 'card-title', style: 'margin-top: var(--s-2);' }, e.title),
              el('div', { class: 'mono', style: 'font-size: 11.5px; color: var(--fg-3);' },
                `${e.dateReadable} · ${e.time || 'time TBA'} · ${e.location || 'venue TBA'}`),
            ]),
            actionMenu([
              { label: e.registered ? 'Unregister' : 'Register',
                icon: editSvg(), onClick: () => toggleRegister(e) },
              { label: 'Edit',   icon: editSvg(),  onClick: () => openEditDialog(e) },
              { label: 'Delete', icon: trashSvg(), danger: true, onClick: () => confirmDelete(e) },
            ]),
          ]),
          e.description
            ? el('p', { style: 'font-size: 13px; color: var(--fg-2); margin: var(--s-3) 0 0;' }, e.description)
            : null,
        ]);
        grid.appendChild(card);
      });
    }

    function buildEventForm(initial = {}) {
      return buildForm([
        { name: 'title',    label: 'Title',    type: 'text', value: initial.title || '', required: true, full: true,
          placeholder: 'Tech Talk · ML Workshop · …' },
        { name: 'type',     label: 'Type',     type: 'select',
          value: (initial.type || 'academic').toLowerCase(),
          options: [
            { value: 'academic', label: 'Academic' },
            { value: 'cultural', label: 'Cultural' },
            { value: 'sports',   label: 'Sports' },
            { value: 'career',   label: 'Career' },
            { value: 'workshop', label: 'Workshop' },
            { value: 'other',    label: 'Other' },
          ] },
        { name: 'date',     label: 'Date',     type: 'date', value: initial.date || fmt.todayISO(), required: true },
        { name: 'time',     label: 'Time',     type: 'text', value: initial.time || '', placeholder: '15:00' },
        { name: 'location', label: 'Location', type: 'text', value: initial.location || '', placeholder: 'Auditorium B' },
        { name: 'description', label: 'Description', type: 'textarea', value: initial.description || '', full: true },
      ], 'grid');
    }

    function openAddDialog() {
      const form = buildEventForm();
      Modal.open({
        title: 'Add event',
        body: form,
        footer: [
          el('button', { class: 'btn',         onClick: () => Modal.close() }, 'Cancel'),
          el('button', { class: 'btn btn-primary', onClick: submit }, 'Add event'),
        ],
      });
      async function submit() {
        const d = readForm(form);
        try {
          await API.addEvent(d);
          Modal.close();
          toast('Event added', 'pos');
          load();
        } catch (err) { toast(err.message, 'neg'); }
      }
    }

    function openEditDialog(e) {
      const form = buildEventForm(e);
      Modal.open({
        title: 'Edit event',
        body: form,
        footer: [
          el('button', { class: 'btn',         onClick: () => Modal.close() }, 'Cancel'),
          el('button', { class: 'btn btn-primary', onClick: submit }, 'Save'),
        ],
      });
      async function submit() {
        const d = readForm(form);
        try {
          await API.updateEvent(e.id, { ...d, registered: e.registered });
          Modal.close();
          toast('Saved', 'pos');
          load();
        } catch (err) { toast(err.message, 'neg'); }
      }
    }

    async function toggleRegister(e) {
      try {
        await API.updateEvent(e.id, { ...e, registered: !e.registered });
        toast(e.registered ? 'Unregistered' : 'Registered', 'pos');
        load();
      } catch (err) { toast(err.message, 'neg'); }
    }

    async function confirmDelete(e) {
      const ok = await Confirm(`Delete "${e.title}"?`);
      if (!ok) return;
      try {
        await API.deleteEvent(e.id);
        toast('Deleted', 'pos');
        load();
      } catch (err) { toast(err.message, 'neg'); }
    }

    $('#btn-add').addEventListener('click', openAddDialog);
    $('#filter').addEventListener('change', () => renderGrid(cached));

    load();
  </script>
</body>
</html>
